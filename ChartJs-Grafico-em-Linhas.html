<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart.js 1</title>
    <style>
        * {font-family: Arial, Helvetica, sans-serif;}
    </style>
</head>
<body>
    <h1>Atividade: Chart.js</h1>
    <h2>Gráfico em Linhas:</h2>

    <div>
        <canvas id="myChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'line',
        data: {
        labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
        datasets: [{
            label: 'Temperatura', 
            data: [30, 29, 28, 25, 22, 23], 
            backgroundColor: ['#FB6582'],
            borderColor: ['#FB6582'],
            borderWidth: 4
        },
        {
            label: 'Umidade',
            data: [80, 82, 80, 85, 80, 83],
            backgroundColor: ['#40A3E8'],
            borderColor: ['#40A3E8'],
            borderWidth: 4
        }]
        },
        options: {
        scales: {
            y: {
            beginAtZero: true
            }
        }
        }
    });
    </script>
</body>
</html>
